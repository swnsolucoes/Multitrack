            creditBalance:
              type: integer
            recentOrders:
              type: array
              items:
                $ref: "#/components/schemas/Order"
            notes:
              type: string
              nullable: true

    AdminUpdateUserBody:
      type: object
      properties:
        role:
          type: string
          enum: [buyer, member, premium, admin, support]
        isBlocked:
          type: boolean
        notes:
          type: string

