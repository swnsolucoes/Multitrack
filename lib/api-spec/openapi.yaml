    CreditEntry:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [earned, used, refunded, adjusted, expired]
        amount:
          type: integer
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, type, amount, description, createdAt]

    CreditBalance:
      type: object
      properties:
        balance:
          type: integer
        maxBalance:
