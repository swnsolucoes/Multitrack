          type: string
          nullable: true
        productCount:
          type: integer
      required: [id, name, slug, productCount]

    # ── Product ───────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        artist:
          type: string
        genre:
          type: string
        coverUrl:
          type: string
          nullable: true
        price:
          type: number
        promoPrice:
          type: number
          nullable: true
        bpm:
          type: integer
          nullable: true
        tonality:
          type: string
          nullable: true
        duration:
          type: string
          nullable: true
        quality:
          type: string
          enum: [premium, standard, backing_track, demo]
        status:
          type: string
          enum: [active, inactive, draft, featured]
        isFeatured:
          type: boolean
        creditsRequired:
          type: integer
        availableForSubscription:
          type: boolean
        totalSales:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, artist, genre, price, quality, status, isFeatured, creditsRequired, availableForSubscription, totalSales, createdAt]

    ProductDetail:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            description:
              type: string
            tracks:
              type: array
              items:
                type: string
            formats:
              type: array
              items:
                type: string
            fileSizeMb:
              type: number
              nullable: true
            previewAudioUrl:
              type: string
              nullable: true
            videoUrl:
              type: string
              nullable: true
            tags:
              type: array
              items:
                type: string
            licenceSummary:
              type: string
              nullable: true
            category:
              $ref: "#/components/schemas/Category"
              nullable: true
            averageRating:
              type: number
              nullable: true
            reviewCount:
              type: integer

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [products, total, page, limit]

    AdminProductBody:
      type: object
      properties:
        name:
          type: string
        artist:
          type: string
        genre:
          type: string
        categoryId:
          type: integer
          nullable: true
        tonality:
          type: string
          nullable: true
        bpm:
          type: integer
          nullable: true
        duration:
          type: string
          nullable: true
        description:
          type: string
        tracks:
          type: array
          items:
            type: string
        formats:
          type: array
          items:
            type: string
        fileSizeMb:
          type: number
          nullable: true
        coverUrl:
          type: string
          nullable: true
        previewAudioUrl:
          type: string
          nullable: true
        videoUrl:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        price:
          type: number
        promoPrice:
          type: number
          nullable: true
        promoPriceStartAt:
          type: string
          format: date-time
          nullable: true
        promoPriceEndAt:
          type: string
          format: date-time
          nullable: true
        quality:
          type: string
          enum: [premium, standard, backing_track, demo]
        status:
          type: string
          enum: [active, inactive, draft, featured]
        isFeatured:
          type: boolean
        availableForSale:
          type: boolean
        availableForSubscription:
          type: boolean
        creditsRequired:
          type: integer
        licenceSummary:
          type: string
          nullable: true
      required: [name, artist, genre, description, price, quality, status]

    # ── Cart ──────────────────────────────────────────────────────────────
    AddToCartBody:
      type: object
      properties:
        productId:
          type: integer
      required: [productId]

    ApplyCouponBody:
      type: object
      properties:
        code:
          type: string
      required: [code]

    CartItem:
      type: object
      properties:
        id:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
        price:
          type: number
      required: [id, product, price]

    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: number
        discount:
          type: number
        total:
          type: number
        couponCode:
          type: string
          nullable: true
        couponDiscount:
          type: number
      required: [items, subtotal, discount, total]

    # ── Orders ────────────────────────────────────────────────────────────
    CreateOrderBody:
      type: object
      properties:
        paymentMethod:
          type: string
          enum: [pix, credit_card]
