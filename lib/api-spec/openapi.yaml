        maxUsesTotal:
          type: integer
          nullable: true
        maxUsesPerUser:
          type: integer
          nullable: true
        usedCount:
          type: integer
        isActive:
          type: boolean
        startsAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, code, type, value, usedCount, isActive, createdAt]

    CreateCouponBody:
      type: object
      properties:
        code:
          type: string
        type:
          type: string
          enum: [percentage, fixed]
        value:
          type: number
        minOrderValue:
          type: number
          nullable: true
        maxUsesTotal:
          type: integer
          nullable: true
        maxUsesPerUser:
          type: integer
          nullable: true
        isActive:
          type: boolean
        startsAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required: [code, type, value]

    # ── Admin Dashboard ───────────────────────────────────────────────────
    DashboardMetrics:
      type: object
