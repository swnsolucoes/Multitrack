          type: string
          enum: [pix, credit_card]
      required: [planId, paymentMethod]

    Subscription:
      type: object
      properties:
        id:
          type: integer
        planId:
          type: integer
        planName:
          type: string
        status:
          type: string
          enum: [active, cancelled, past_due, paused]
        currentPeriodStart:
          type: string
          format: date-time
        currentPeriodEnd:
          type: string
          format: date-time
        cancelAtPeriodEnd:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, planId, planName, status, currentPeriodStart, currentPeriodEnd, cancelAtPeriodEnd, createdAt]

