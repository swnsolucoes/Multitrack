    DownloadGrant:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productArtist:
          type: string
        coverUrl:
          type: string
          nullable: true
        source:
          type: string
          enum: [purchase, credit, rateio]
        downloadCount:
          type: integer
        lastDownloadAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, productId, productName, productArtist, source, downloadCount, createdAt]

    DownloadLink:
      type: object
      properties:
        url:
          type: string
        expiresAt:
          type: string
          format: date-time
      required: [url, expiresAt]

    # ── Subscriptions ─────────────────────────────────────────────────────
    Plan:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
