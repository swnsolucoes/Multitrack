          type: number
        averageOrderValue:
          type: number
        totalOrders:
          type: integer
        totalUsers:
          type: integer
        premiumUsers:
          type: integer
        totalDownloads:
          type: integer
        topProducts:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              artist:
                type: string
              sales:
                type: integer
              revenue:
                type: number
            required: [id, name, artist, sales, revenue]
        rateioStats:
          type: object
          properties:
            open:
              type: integer
            completed:
              type: integer
            cancelled:
              type: integer
          required: [open, completed, cancelled]
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required: [totalRevenue, revenueByChannel, mrr, churnRate, averageOrderValue, totalOrders, totalUsers, premiumUsers, totalDownloads, topProducts, rateioStats, recentOrders]
