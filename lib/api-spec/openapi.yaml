          type: string
          nullable: true
        justification:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
      required: [songName, artist]

    Rateio:
      type: object
      properties:
        id:
          type: integer
        songName:
          type: string
        artist:
          type: string
        genre:
          type: string
          nullable: true
        status:
          type: string
          enum: [suggested, in_quotation, open, goal_reached, awaiting_payment, payment_confirmed, in_progress, completed, cancelled, refunded]
        targetAmount:
          type: number
          nullable: true
        amountPerParticipant:
          type: number
          nullable: true
        minParticipants:
          type: integer
          nullable: true
        currentParticipants:
          type: integer
        minPercentage:
          type: number
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        coverUrl:
          type: string
          nullable: true
        isParticipating:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, songName, artist, status, currentParticipants, isParticipating, createdAt]

    RateioParticipant:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        paymentStatus:
          type: string
          enum: [pending, paid, overdue, refunded]
        joinedAt:
          type: string
          format: date-time
      required: [id, userId, userName, paymentStatus, joinedAt]

    RateioComment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        isAdmin:
          type: boolean
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, userId, userName, isAdmin, content, createdAt]

    RateioDetail:
      allOf:
        - $ref: "#/components/schemas/Rateio"
        - type: object
          properties:
            justification:
              type: string
              nullable: true
            participants:
              type: array
              items:
                $ref: "#/components/schemas/RateioParticipant"
            comments:
              type: array
              items:
                $ref: "#/components/schemas/RateioComment"
            product:
              $ref: "#/components/schemas/Product"
              nullable: true

    AddCommentBody:
      type: object
      properties:
        content:
          type: string
      required: [content]

    AdminRateioStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [in_quotation, open, goal_reached, awaiting_payment, payment_confirmed, in_progress, completed, cancelled, refunded]
        targetAmount:
          type: number
          nullable: true
        amountPerParticipant:
          type: number
          nullable: true
        minParticipants:
          type: integer
          nullable: true
        minPercentage:
          type: number
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        cancelReason:
          type: string
          nullable: true
      required: [status]

