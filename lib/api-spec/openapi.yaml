          type: string
          nullable: true
      required: [orderId, status]

    Order:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [pending, paid, cancelled, refunded, chargeback]
        paymentMethod:
          type: string
        subtotal:
          type: number
        discount:
          type: number
        total:
          type: number
        couponCode:
          type: string
          nullable: true
        itemCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, status, paymentMethod, subtotal, discount, total, itemCount, createdAt]

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
