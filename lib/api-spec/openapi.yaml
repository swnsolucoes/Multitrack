            $ref: "#/components/schemas/CreditEntry"
      required: [balance, maxBalance, ledger]

    UseCreditsBody:
      type: object
      properties:
        productId:
          type: integer
      required: [productId]

    AdminCreditAdjustBody:
      type: object
      properties:
        userId:
          type: integer
        amount:
          type: integer
        description:
          type: string
      required: [userId, amount, description]

