kind = "web"
previewPath = "/"
title = "MultiTrack Hub"
version = "1.0.0"
id = "artifacts/multitrack-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22394

[services.development]
run = "pnpm --filter @workspace/multitrack-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/multitrack-hub", "run", "build" ]
publicDir = "artifacts/multitrack-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22394"
BASE_PATH = "/"
